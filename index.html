<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impromptu Speech</title>
    <!-- 
    How to use:
    1. Double-click this index.html file to open in a browser.
    2. Click "Draw a Topic" to start the vertical scrolling animation.
    3. Once a topic is selected, click "I'm ready" for a 60s planning phase, 
       or "Start Speech Now" to skip planning.
    4. After planning, click "Start Speaking" for a 60s speech timer.
    5. No internet required; audio is generated via Web Audio API.
    -->
    <style>
        :root {
            --primary: #f97316;
            --primary-dark: #ea580c;
            --bg: #fff7ed;
            --card: #ffffff;
            --text: #431407;
            --text-light: #9a3412;
            --accent: #ef4444;
            --danger: #dc2626;
            --gradient: linear-gradient(135deg, #f97316, #ef4444);
            --font-sans: system-ui, -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #app {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
        }

        .card {
            background: var(--card);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            min-height: 480px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            color: var(--accent);
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 16px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 12px;
            outline: none;
            user-select: none;
        }

        .btn-primary {
            background: var(--gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .btn-outline {
            background-color: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:active {
            background-color: #eff6ff;
        }

        .btn-text {
            background: none;
            color: var(--text-light);
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: underline;
            margin-top: 24px;
        }

        /* Vertical Slot Machine */
        .slot-machine {
            height: 240px;
            overflow: hidden;
            position: relative;
            margin: 1.5rem 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .slot-viewport {
            height: 80px;
            width: 100%;
            position: absolute;
            top: 80px;
            left: 0;
            pointer-events: none;
            z-index: 2;
            /* Optional: add a subtle highlight or shadow to the viewport area if desired, 
               but user asked to remove the gray box. */
        }

        .slot-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            will-change: transform;
        }

        .slot-item {
            height: 80px;
            line-height: 80px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            opacity: 0.3;
            transition: transform 0.2s ease, opacity 0.2s ease, color 0.2s ease;
            white-space: nowrap;
            width: 100%;
            text-align: center;
        }

        .slot-item.active {
            opacity: 1;
            color: var(--accent);
            transform: scale(2.25);
        }

        .result-display {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 2rem 0;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-text {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--accent);
            display: block;
            line-height: 1.1;
        }

        /* Timer and Progress */
        .timer-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 1.5rem auto;
        }

        .timer-svg {
            transform: rotate(-90deg);
            width: 200px;
            height: 200px;
        }

        .timer-bg {
            fill: none;
            stroke: #e2e8f0;
            stroke-width: 8;
        }

        .timer-progress {
            fill: none;
            stroke: var(--accent);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.1s linear;
        }

        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .phase-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .hidden { display: none !important; }

        @media (max-width: 400px) {
            .result-text { font-size: 2.5rem; }
            .timer-container { width: 160px; height: 160px; }
            .timer-svg { width: 160px; height: 160px; }
            .timer-text { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-home" class="card animate-fade">
        <h1>Impromptu Speech</h1>
        <p class="subtitle">Master the Art of Speaking</p>
        <div class="slot-machine" style="flex-grow: 1;">
            <div class="slot-viewport"></div>
            <div id="slot-list" class="slot-list">
                <!-- Topics will be populated here -->
            </div>
        </div>
        <div style="margin-top: auto;">
            <button id="btn-draw" class="btn btn-primary">Draw a Topic</button>
        </div>
    </div>

    <div id="screen-result" class="card hidden">
        <p class="subtitle">Speech Topic</p>
        <div class="result-display">
            <span id="res-text" class="result-text">Topic</span>
        </div>
        <div style="margin-top: auto;">
            <button id="btn-ready" class="btn btn-primary" style="margin-bottom: 32px;">I'm ready</button>
            <button id="btn-speech-now" class="btn btn-outline">Start Speech Now</button>
            <button id="btn-redraw" class="btn btn-text">Redraw a Topic</button>
        </div>
    </div>

    <div id="screen-timer" class="card hidden">
        <p id="timer-phase-label" class="subtitle">Planning Time</p>
        <h2 id="timer-topic" class="phase-title">Topic Name</h2>
        <div class="timer-container">
            <svg class="timer-svg">
                <circle class="timer-bg" cx="100" cy="100" r="90"></circle>
                <circle id="timer-progress" class="timer-progress" cx="100" cy="100" r="90"></circle>
            </svg>
            <div id="timer-display" class="timer-text">1:00</div>
        </div>
        <div id="timer-controls" style="margin-top: auto;">
            <button id="btn-start-speech" class="btn btn-primary hidden">Start Speaking</button>
            <button id="btn-cancel" class="btn btn-text">Restart</button>
        </div>
    </div>

    <div id="screen-finish" class="card hidden">
        <h1>Time's Up!</h1>
        <p class="subtitle">Speech Ended</p>
        <div style="flex-grow: 1; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
            Great job! You've completed a practice session.
        </div>
        <div style="margin-top: auto;">
            <button id="btn-restart" class="btn btn-primary">Practice Again</button>
        </div>
    </div>
</div>

<script>
    // Abstract and general topics (Jobs and Items removed)
    const rawData = "Happiness,Sadness,Anger,Fear,Courage,Wisdom,Time,Space,Life,Death,Love,Friendship,Hope,Dream,Reality,Freedom,Justice,Peace,War,Order,Chaos,Truth,Lie,Beauty,Ugliness,Solitude,Bustle,Silence,Noise,Simplicity,Complexity,Purity,Dirtiness,Warmth,Coldness,Light,Darkness,Success,Failure,Beginning,Ending,Eternity,Moment,Fate,Samsara,Dreamland,Nothingness,Existence,Balance,Conflict,Cooperation,Competition,Betrayal,Loyalty,Sacrifice,Greed,Generosity,Envy,Pride,Humility,Patience,Curiosity,Nostalgia,Adventure,Safety,Danger,Travel,Homecoming,Oblivion,Memory,Sound,Color,Taste,Touch,Smell,Weight,Depth,Height,Width,Speed,Power,Weakness,Secret,Mask,Soul,Body,Shadow,Echo,Mirror Image,Fragment,Whole,Circle,Square,Triangle,Boundary,Core,Portal,Window,Wall,Bridge,Road,Maze,History,Future,Present,Past,Season,Spring,Summer,Autumn,Winter,Sun,Moon,Star,Cloud,Raindrop,Snowflake,Flame,Water,Earthquake,Volcano,Rainbow,Aurora,Tide,Bubble,Spark,Dust,Smoke,Music,Rhythm,Melody,Harmony,Noise,Applause,Laughter,Crying,Scream,Whisper,Silence,Dialogue,Speech,Reading,Writing,Thinking,Creation,Destruction,Learning,Teaching,Game,Work,Rest,Sleep,Sport,Victory,Trophy,Rule,Duty,Right,Law,Morality,Faith,Science,Art,Technology,Magic,Miracle,Disaster,Disease,Health,Hunger,Thirst,Wealth,Poverty,Power,Fame,Dignity,Glory,Shame,Kindness,Evil,Fairness,Prejudice,Discrimination,Tolerance,Revenge,Forgiveness,Empathy,Indifference,Passion,Calmness,Madness,Reason,Intuition,Instinct,Inspiration,Creativity,Logic,Imagination,Doubt,Trust,Promise,Equality,Fraternity,Democracy,Dictatorship,Revolution,Reform,Tradition,Modernity,Culture,Civilization,Barbarism,Nature,Artificial,Environment,Climate,Energy,Resource,Waste,Pollution,Protection,Development,Progress,Regress,Evolution,Extinction,Diversity,Unity,Harmony,Sustainability,Global,Local,City,Village,Family,Society,Nation,World,Universe,Matter,Information,Knowledge,Data,Network,Communication,Traffic,Trade,Finance,Economy,Politics,Religion,Philosophy,Psychology,Physiology,Gene,Cell,Organ,System,Structure,Function,Process,Result,Cause,Effect,Change,Stability,Risk,Opportunity,Challenge,Goal,Plan,Action,Experience,Lesson,Error,Correct,Standard,Quality,Efficiency,Effectiveness,Value,Meaning,Purpose,Motive,Intent,Attitude,Character,Personality,Identity,Role,Status,Relationship,Connection,Gap,Distance,Direction,Position,Background,Foreground,Focus,Perspective,Vision,Insight,Foresight,Retrospect,Reflection,Criticism,Praise,Encouragement,Support,Opposition,Resistance,Compromise,Negotiation,Agreement,Reconciliation,Security,Threat,Rescue,Help,Service,Contribution,Achievement,Honor,Independence,Dependence,Mutual Aid,Solidarity,Isolation,Exclusion,Inclusion,Diversity,Equity,Conscience,Spirit,Mind,Emotion,Intellect,Will,Desire,Need,Satisfaction,Pain,Suffering,Well-being,Tragedy,Comedy,Irony,Humor,Seriousness,Levity,Shallowness,Breadth,Narrowness,Openness,Closure,Transparency,Obscurity,Clarity,Ambiguity,Certainty,Skepticism,Ignorance,Objectivity,Subjectivity,Fact,Fiction,Fantasy,Practice,Theory,Application,Innovation,Imitation,Originality,Copy,Uniqueness,Ordinariness,Excellence,Mediocrity,Genius,Mortal,Villain,Mentor,Partner,Rival,Leader,Follower,Masses,Individual,Public,Private,Property,Distribution,Consumption,Production,Labor,Leisure,Aesthetics,Fashion,Style,Form,Medium,Interpretation,Misunderstanding,Expression,Listening,Understanding,Resonance,Separation,Intimacy,Alienation,Belonging,Wandering,Foreign Land,Crossing,Limitation,Breakthrough,Limit,Possibility,Probability,Chance,Necessity,Coincidence,Daily Life,Trivia,Ritual,Habit,Growth,Aging,Rebirth,Cycle,Imbalance,Deconstruction,Reorganization,Degeneration,Slowness,Stagnation,Flow,Stillness,Meter,Light and Shadow,Texture,Atmosphere,Senses";

    const topics = rawData.split(',').map(item => item.trim());

    // State
    let currentTopic = null;
    let timerInterval = null;
    let startTime = null;
    let duration = 60;
    let phase = 'planning';

    // Audio Context
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playBeep(freq = 880, duration = 0.15, type = 'sine') {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function playTick() {
        playBeep(1200, 0.02, 'square');
    }

    function playEndSound() {
        // More prominent 2-second sound
        const now = audioCtx.currentTime;
        for (let i = 0; i < 6; i++) {
            const time = now + i * 0.35;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(i % 2 === 0 ? 660 : 880, time);
            gain.gain.setValueAtTime(0.1, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(time);
            osc.stop(time + 0.3);
        }
    }

    // Screen Management
    function showScreen(id) {
        document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
        const target = document.getElementById(id);
        target.classList.remove('hidden');
        target.classList.add('animate-fade');
    }

    // Populate Slot Machine
    const slotList = document.getElementById('slot-list');
    function populateSlot() {
        slotList.innerHTML = '';
        
        // Add last item at the beginning for buffer
        const lastDiv = document.createElement('div');
        lastDiv.className = 'slot-item';
        lastDiv.innerText = topics[topics.length - 1];
        slotList.appendChild(lastDiv);

        // Original items
        topics.forEach(t => {
            const div = document.createElement('div');
            div.className = 'slot-item';
            div.innerText = t;
            slotList.appendChild(div);
        });

        // Add first few items at the end for buffer
        for (let i = 0; i < 5; i++) {
            const div = document.createElement('div');
            div.className = 'slot-item';
            div.innerText = topics[i];
            slotList.appendChild(div);
        }
        
        // Initial state
        slotList.style.transform = 'translateY(0px)';
        updateActiveItem(0);
    }
    populateSlot();

    // Drawing Animation
    function startDrawing() {
        const btnDraw = document.getElementById('btn-draw');
        btnDraw.disabled = true;

        const itemHeight = 80;
        const totalItems = topics.length;
        const finalIndex = Math.floor(Math.random() * totalItems);
        
        const totalDuration = 2000; // 2 seconds for a smooth feel
        const startTime = performance.now();
        let lastIndex = -1;

        // Easing function for smooth stop
        function easeOutQuart(x) {
            return 1 - Math.pow(1 - x, 4);
        }

        function animate(now) {
            const elapsed = now - startTime;
            const progress = Math.min(elapsed / totalDuration, 1);
            const easedProgress = easeOutQuart(progress);
            
            // We scroll through a few full loops plus the final index to ensure a smooth stop
            const spinLoops = 3; 
            const totalDistanceItems = (spinLoops * totalItems) + finalIndex;
            const currentPos = easedProgress * (totalDistanceItems * itemHeight);
            
            // Apply visual transform with modulo for seamless loop
            const visualPos = currentPos % (totalItems * itemHeight);
            slotList.style.transform = `translateY(-${visualPos}px)`;
            
            // Update active item based on visual position
            const currentIndex = Math.round(visualPos / itemHeight) % totalItems;
            if (currentIndex !== lastIndex) {
                playTick();
                updateActiveItem(currentIndex);
                lastIndex = currentIndex;
            }

            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                // Final alignment
                slotList.style.transform = `translateY(-${finalIndex * itemHeight}px)`;
                updateActiveItem(finalIndex);
                
                // Pause for 1 second then transition
                setTimeout(() => {
                    currentTopic = topics[finalIndex];
                    document.getElementById('res-text').innerText = currentTopic;
                    showScreen('screen-result');
                    btnDraw.disabled = false;
                }, 1000);
            }
        }
        requestAnimationFrame(animate);
    }

    function updateActiveItem(topicIndex) {
        const items = slotList.querySelectorAll('.slot-item');
        // topicIndex 0 corresponds to DOM index 1 because of the buffer item at index 0
        items.forEach((item, i) => {
            if (i === topicIndex + 1) item.classList.add('active');
            else item.classList.remove('active');
        });
    }

    // Timer Logic
    function startTimer(secs) {
        clearInterval(timerInterval);
        duration = secs;
        startTime = Date.now();
        updateTimerDisplay();

        timerInterval = setInterval(() => {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const remaining = duration - elapsed;

            if (remaining <= 0) {
                clearInterval(timerInterval);
                onTimerEnd();
            } else {
                updateTimerDisplay(remaining);
            }
        }, 100);
    }

    function updateTimerDisplay(remaining = duration) {
        const display = document.getElementById('timer-display');
        const progress = document.getElementById('timer-progress');
        
        const m = Math.floor(remaining / 60);
        const s = remaining % 60;
        display.innerText = `${m}:${s.toString().padStart(2, '0')}`;

        const offset = 565 - (remaining / duration) * 565;
        progress.style.strokeDasharray = '565';
        progress.style.strokeDashoffset = offset;
    }

    function onTimerEnd() {
        playEndSound();

        if (phase === 'planning') {
            document.getElementById('timer-phase-label').innerText = 'Ready?';
            document.getElementById('btn-start-speech').classList.remove('hidden');
            document.getElementById('timer-display').innerText = "1:00";
        } else {
            showScreen('screen-finish');
        }
    }

    // Event Listeners
    document.getElementById('btn-draw').onclick = startDrawing;
    document.getElementById('btn-redraw').onclick = () => showScreen('screen-home');
    
    document.getElementById('btn-ready').onclick = () => {
        phase = 'planning';
        document.getElementById('timer-phase-label').innerText = 'Planning Time';
        document.getElementById('timer-topic').innerText = currentTopic;
        document.getElementById('btn-start-speech').classList.add('hidden');
        showScreen('screen-timer');
        startTimer(60);
    };

    document.getElementById('btn-speech-now').onclick = () => {
        phase = 'speech';
        document.getElementById('timer-phase-label').innerText = 'Speaking';
        document.getElementById('timer-topic').innerText = currentTopic;
        document.getElementById('btn-start-speech').classList.add('hidden');
        showScreen('screen-timer');
        startTimer(60);
    };

    document.getElementById('btn-start-speech').onclick = () => {
        phase = 'speech';
        document.getElementById('timer-phase-label').innerText = 'Speaking';
        document.getElementById('btn-start-speech').classList.add('hidden');
        startTimer(60);
    };

    document.getElementById('btn-cancel').onclick = () => {
        clearInterval(timerInterval);
        showScreen('screen-home');
    };

    document.getElementById('btn-restart').onclick = () => showScreen('screen-home');

    // Init
    updateTimerDisplay(60);
</script>

</body>
</html>
